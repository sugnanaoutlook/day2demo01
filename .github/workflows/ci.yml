name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [manual-run]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile Java sources
        run: |
          mkdir -p out
          javac -d out src/*.java
          echo "Compilation successful!"

      - name: Verify build output
        run: |
          echo "Compiled class files:"
          ls -la out/
          echo "Build completed!"

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compile and run basic test
        run: |
          mkdir -p out
          javac -d out src/*.java
          echo "All Java files compiled without errors."
          echo "Classes found: $(ls out/*.class | wc -l)"
          echo "Test passed!"
